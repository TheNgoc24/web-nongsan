<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>

    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body{
            background:#f5f5f5;
        }

        .cart-box{
            background:white;
            border-radius:12px;
            padding:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .cart-item{
            display:flex;
            align-items:center;
            gap:15px;
            padding:15px;
            border-bottom:1px solid #eee;
        }

        .cart-item img{
            width:90px;
            height:90px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:#ee4d2d;
            font-weight:bold;
        }

        .qty-box{
            display:flex;
            align-items:center;
            gap:8px;
        }

        .summary{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .checkout-btn{
            font-size:18px;
            padding:12px;
        }

        .remove-btn{
            font-size:14px;
        }
    </style>
</head>

<body class="container mt-5">

<h2>🛒 Giỏ hàng của bạn</h2>

<table class="table table-bordered">

    <thead>
    <tr>
        <th>Ảnh</th>
        <th>Tên</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>

    <div class="row">

        <!-- DANH SÁCH -->
        <div class="col-md-8">

            <div class="cart-box">

                <div th:if="${cart.isEmpty()}">
                    <h5>Giỏ hàng trống 😢</h5>
                    <a href="/" class="btn btn-primary mt-3">Mua ngay</a>
                </div>

                <div th:each="item : ${cart}" class="cart-item">

                    <img th:src="@{/images/{img}(img=${item.product.image})}">

                    <div class="flex-grow-1">
                        <h5 th:text="${item.product.name}"></h5>
                        <div class="price"
                             th:text="${item.product.price + ' VNĐ'}"></div>
                    </div>

                    <!-- SỐ LƯỢNG -->
                    <div class="qty-box">
                        <button class="btn btn-outline-secondary"
                                th:onclick="'decrease(' + ${item.product.id} + ')'">-</button>

                        <span th:text="${item.quantity}"></span>

                        <button class="btn btn-outline-success"
                                th:onclick="'increase(' + ${item.product.id} + ')'">+</button>
                    </div>

                    <!-- TOTAL -->
                    <div style="width:120px;text-align:right">
                        <b th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')}"></b>
                    </div>

                    <!-- DELETE -->
                    <button class="btn btn-danger"
                            th:onclick="'removeItem(' + ${item.product.id} + ')'">
                        Xóa
                    </button>

                </div>

            </div>

        </div>

        <!-- TỔNG TIỀN -->
        <div class="col-md-4">

            <div class="summary">

                <h4>Tổng đơn</h4>
                <hr>

                <h5 class="text-danger">
                    <span id="total" th:text="${total}"></span> VNĐ
                </h5>

                <form action="/checkout" method="get">
                    <button class="btn btn-success w-100 checkout-btn mt-3">
                        Thanh toán
                    </button>
                </form>

                <a href="/" class="btn btn-outline-primary w-100 mt-2">
                    Tiếp tục mua
                </a>

            </div>

        </div>

    </div>


<script>
    function increase(id){
        fetch("/cart/increase", {
            method: "POST",
            headers: {
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body: "id=" + id
        })
            .then(res => res.text())
            .then(total => {
                document.getElementById("total").innerText = total;
                location.reload();
            });
    }

    function decrease(id){
        fetch("/cart/decrease", {
            method: "POST",
            headers: {
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body: "id=" + id
        })
            .then(res => res.text())
            .then(total => {
                document.getElementById("total").innerText = total;
                location.reload();
            });
    }

    function removeItem(id){
        fetch("/cart/remove", {
            method: "POST",
            headers: {
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body: "id=" + id
        })
            .then(res => res.text())
            .then(total => {
                document.getElementById("total").innerText = total;
                location.reload();
            });
    }
</script>
</body>
</html>
