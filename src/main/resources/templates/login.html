<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg,#00c6ff, #11ff00,#00ffcc, #79af7a);
            background-size:400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 60px rgba(0,0,0,0.25);
            animation: fadeSlide 1s ease;
        }

        @keyframes fadeSlide{
            from{
                opacity:0;
                transform: translateY(40px);
            }
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

        .logo{
            text-align:center;
            font-size:32px;
            font-weight:800;
            color:#0072ff;
            margin-bottom:20px;
        }

        .form-control{
            border-radius:12px;
            transition:0.3s;
        }

        .form-control:focus{
            box-shadow:0 0 15px rgba(0,114,255,0.4);
            border-color:#0072ff;
        }

        .btn-login{
            background:#0072ff;
            border:none;
            border-radius:12px;
            font-weight:600;
            position:relative;
            overflow:hidden;
        }

        .btn-login:hover{
            background:#005ad1;
        }

        .btn-login::after{
            content:'';
            position:absolute;
            width:300%;
            height:300%;
            background:rgba(255,255,255,0.2);
            top:-100%;
            left:-100%;
            transform:rotate(45deg);
            transition:0.5s;
        }

        .btn-login:hover::after{
            top:100%;
            left:100%;
        }

        .register{
            text-align:center;
            margin-top:15px;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">🛒 Nông Sản</div>

    <h4 class="text-center mb-4">Đăng nhập tài khoản</h4>

    <form method="post" action="/login" onsubmit="showLoading()">

        <input name="username" placeholder="Tên đăng nhập"
               class="form-control mb-3" required>

        <input name="password" type="password"
               placeholder="Mật khẩu"
               class="form-control mb-3" required>

        <button class="btn btn-login w-100" id="loginBtn">
            Đăng nhập
        </button>

    </form>

    <div class="error" th:text="${error}"></div>

    <div class="register">
        Chưa có tài khoản? <a href="/register">Đăng ký</a>
    </div>

</div>

<script>
    function showLoading(){
        let btn = document.getElementById("loginBtn");
        btn.innerHTML = "Đang đăng nhập...";
        btn.disabled = true;
    }
</script>

</body>
</html>
