<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin - Quản lý sản phẩm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="/">Nông Sản Thái Nguyên</a>
  </div>
</nav>

<div class="container mt-4">

  <h2>Quản lý sản phẩm</h2>

  <div class="row mb-4">

    <div class="col-md-4">
      <div class="card text-center shadow p-3">
        <h6>Tổng sản phẩm</h6>
        <h3 th:text="${totalProducts}"></h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center shadow p-3">
        <h6>Tổng người dùng</h6>
        <h3 th:text="${totalUsers}"></h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center shadow p-3">
        <h6>Đơn hàng</h6>
        <h3>0</h3>
      </div>
    </div>

  </div>
  <div class="card p-3 shadow mb-4">

    <h5>Thêm sản phẩm</h5>

    <form action="/admin/save-product" method="post" enctype="multipart/form-data">

      <input name="name" class="form-control mb-2" placeholder="Tên sản phẩm">

      <input name="price" class="form-control mb-2" placeholder="Giá">

      <textarea name="description" class="form-control mb-2" placeholder="Mô tả"></textarea>

      <input type="file" name="image" class="form-control mb-2">

      <button class="btn btn-success w-100">Lưu sản phẩm</button>

    </form>

  </div>

  <hr>

  <!-- DANH SÁCH SẢN PHẨM -->

  <div class="card shadow">
    <div class="card-header">
      Danh sách sản phẩm
    </div>

    <div class="card-body">

      <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Ảnh</th>
          <th>Tên</th>
          <th>Giá</th>
          <th>Hành động</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${products}">
          <td th:text="${p.id}"></td>

          <td>
            <img th:src="@{/images/{img}(img=${p.image})}"
                 width="60" height="60" style="object-fit:cover;">
          </td>

          <td th:text="${p.name}"></td>
          <td th:text="${p.price}"></td>
          <td>
            <a th:href="@{/admin/edit/{id}(id=${p.id})}"
               class="btn btn-warning btn-sm">Sửa</a>

            <a th:href="@{/admin/delete/{id}(id=${p.id})}"
               class="btn btn-danger btn-sm">
              Xóa
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
    </div>
  </div>
</div>
<div class="card mt-4 p-3 shadow">
  <h5>Biểu đồ thống kê</h5>
  <canvas id="myChart"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

  const totalProducts = /*[[${totalProducts}]]*/ 0;
  const totalUsers = /*[[${totalUsers}]]*/ 0;

  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Sản phẩm', 'Người dùng'],
      datasets: [{
        label: 'Thống kê',
        data: [totalProducts, totalUsers]
      }]
    }
  });

</script>
</body>

</html>
