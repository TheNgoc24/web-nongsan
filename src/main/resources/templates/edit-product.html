<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Sửa sản phẩm</h2>

<form action="/admin/update-product" method="post" enctype="multipart/form-data">

    <input type="hidden" name="id" th:value="${product.id}">

    <input name="name" class="form-control mb-2"
           th:value="${product.name}">

    <input name="price" class="form-control mb-2"
           th:value="${product.price}">

    <textarea name="description" class="form-control mb-2"
              th:text="${product.description}"></textarea>

    <p>Ảnh hiện tại:</p>
    <img th:src="${product.image}" width="100">

    <input type="text"
           name="image"
           th:value="${product.image}"
           class="form-control">

    <button class="btn btn-primary mt-3">Cập nhật</button>

</form>

</body>
</html>
