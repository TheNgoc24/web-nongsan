<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .product-item{
            display:flex;
            align-items:center;
            gap:15px;
            padding:10px 0;
            border-bottom:1px solid #eee;
        }

        .product-item img{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
        }

        .price{
            color:#ee4d2d;
            font-weight:bold;
        }

        .total-box{
            font-size:20px;
            font-weight:bold;
            color:#ee4d2d;
        }

        .btn-order{
            font-size:18px;
            padding:12px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">🧾 Xác nhận đơn hàng</h2>

    <div class="row">

        <!-- DANH SÁCH SẢN PHẨM -->
        <div class="col-md-8">

            <div class="box">

                <h5>Sản phẩm</h5>
                <hr>

                <div th:each="item : ${cart}" class="product-item">

                    <img th:src="${product.image}"
                         th:alt="${product.name}"
                         class="img-fluid rounded shadow mb-3"/>


                    <div class="flex-grow-1">
                        <h6 th:text="${item.product.name}"></h6>
                        <div class="price"
                             th:text="${item.product.price + ' VNĐ'}"></div>
                    </div>

                    <div>
                        x<span th:text="${item.quantity}"></span>
                    </div>

                    <div class="price"
                         th:text="${item.product.price * item.quantity + ' VNĐ'}"></div>

                </div>

            </div>

        </div>

        <!-- FORM -->
        <div class="col-md-4">

            <div class="box">

                <h5>Thông tin nhận hàng</h5>

                <form action="/checkout" method="post">

                    <input name="name" class="form-control mb-2"
                           placeholder="Họ tên" required>

                    <input name="phone" class="form-control mb-2"
                           placeholder="Số điện thoại" required>

                    <input name="address" class="form-control mb-2"
                           placeholder="Địa chỉ" required>

                    <hr>

                    <div class="total-box mb-3">
                        Tổng: <span th:text="${total}"></span> VNĐ
                    </div>

                    <button class="btn btn-success w-100 btn-order">
                        🛒 Đặt hàng
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
