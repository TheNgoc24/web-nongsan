<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${product.name} + ' | Nông sản sạch Thái Nguyên'"></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta property="og:url"
          th:content="@{'https://web-nongsan-production.up.railway.app/product/' + ${product.slug}}">

    <meta name="description"
          th:content="${product.description}" />

    <meta name="keywords"
          content="nông sản, thực phẩm sạch, trái cây, rau củ" />

    <meta property="og:title"
          th:content="${product.name}" />

    <meta property="og:description"
          th:content="${product.description}" />

    <meta property="og:image"
          th:content="${product.image}" />

    <link rel="canonical"
          th:href="@{'https://web-nongsan-production.up.railway.app/product/' + ${product.slug}}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .product-box{
            background:white;
            padding:30px;
            border-radius:10px;
        }

        .main-img{
            width:100%;
            height:350px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            font-size:32px;
            color:#ee4d2d;
            font-weight:bold;
        }

        .thumb img{
            width:70px;
            height:70px;
            object-fit:cover;
            margin-right:10px;
            border-radius:6px;
            cursor:pointer;
        }

        .thumb img:hover{
            border:2px solid #ee4d2d;
        }

        .buy-btn{
            font-size:18px;
            padding:12px 25px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">🌿 Nông Sản Thái Nguyên</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="product-box shadow">

        <div class="row">

            <div class="col-md-5">
                <img th:src="${product.image}"
                     th:alt="${product.name}"
                     class="img-fluid rounded shadow mb-3">

                <div class="thumb d-flex gap-2">
                    <img th:src="${product.image}" width="70">
                </div>
            </div>

            <!-- THÔNG TIN SẢN PHẨM -->

            <div class="col-md-7">

                <h2 th:text="${product.name}"></h2>

                <div class="price mt-3">
                    <span th:text="${product.price}"></span> VNĐ
                </div>

                <hr>

                <h5>Mô tả sản phẩm</h5>
                <p th:text="${product.description}"></p>

                <hr>

                <h5>Số lượng</h5>

                <input type="number" value="1" min="1"
                       class="form-control"
                       style="width:120px">

                <div class="mt-4 d-flex gap-3">

                    <button class="btn btn-warning buy-btn"
                            th:data-id="${product.id}"
                            onclick="addToCart(this)">
                         Thêm vào giỏ
                    </button>

                    <button class="btn btn-success buy-btn"
                            th:data-id="${product.id}"
                            onclick="buyNow(this)">
                         Mua ngay
                    </button>
                </div>

                <div class="mt-4">

                    <a href="/" class="btn btn-secondary">

                        ⬅ Quay lại trang chủ

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
<script type="application/ld+json">
    {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": "[[${product.name}]]",
        "image": "[[${product.image}]]",
        "description": "[[${product.description}]]",
        "offers": {
            "@type": "Offer",
            "price": "[[${product.price}]]",
            "priceCurrency": "VND"
        }
    }
</script>
<script th:inline="javascript">
    function addToCart(btn){
        let id = btn.getAttribute("data-id");

        fetch('/cart/add/' + id, {
            method: 'GET',
            credentials: 'same-origin'
        })
        .then(res => res.text())
        .then(() => {
            let toast = new bootstrap.Toast(document.getElementById('toast'));
            toast.show();
        });
    }

    function buyNow(btn){
        let id = btn.getAttribute("data-id");

        fetch('/cart/add/' + id, {
            method: 'GET',
            credentials: 'same-origin'
        })
        .then(res => res.text())
        .then(() => {
            window.location.href = "/checkout";
        });
    }
</script>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white bg-success border-0">
        <div class="toast-body">
            ✔ Đã thêm vào giỏ hàng
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
