<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' | Nông sản sạch Thái Nguyên'">Chi tiết sản phẩm</title>

    <meta name="description" th:content="${product.description}">
    <meta name="keywords" content="nông sản sạch, đặc sản Thái Nguyên, thực phẩm sạch">
    <meta name="robots" content="index, follow">

    <meta property="og:title" th:content="${product.name}">
    <meta property="og:description" th:content="${product.description}">
    <meta property="og:image" th:content="${product.image}">

    <link rel="canonical"
          th:href="@{'https://web-nongsan-production.up.railway.app/product/' + ${product.slug}}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f5f5;">

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🌿 Nông Sản Thái Nguyên</a>

        <div class="ms-auto d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">Tin tức</a>
            <a href="/shop" class="btn btn-light btn-sm">Mua hàng</a>
            <a href="/cart" class="btn btn-warning btn-sm">
                🛒 Giỏ hàng <span class="badge bg-danger" th:text="${count}">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="card shadow border-0 rounded-4 p-4">
        <div class="row g-4">

            <div class="col-md-5">
                <img th:src="${product.image}"
                     th:alt="${product.name}"
                     class="img-fluid rounded-4 shadow-sm"
                     style="width:100%; height:420px; object-fit:cover;">

                <div class="mt-3 d-flex gap-2">
                    <img th:src="${product.image}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;">
                    <img th:src="${product.image}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;">
                    <img th:src="${product.image}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;">
                </div>
            </div>

            <div class="col-md-7">
                <h2 class="fw-bold" th:text="${product.name}">Tên sản phẩm</h2>

                <p class="text-muted mt-2">
                    Nông sản sạch, nguồn gốc rõ ràng, phù hợp cho bữa ăn gia đình.
                </p>

                <div class="my-4">
                    <span class="text-danger fw-bold"
                          style="font-size:34px;"
                          th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' VNĐ'">
                    </span>
                </div>

                <hr>

                <h5 class="fw-bold">Mô tả sản phẩm</h5>
                <p style="line-height:1.8;text-align:justify;"
                   th:text="${product.description}">
                </p>

                <div class="alert alert-success mt-4">
                    Cam kết sản phẩm sạch, giao hàng nhanh, hỗ trợ đổi trả nếu sản phẩm không đúng mô tả.
                </div>

                <div class="mt-4 d-flex gap-3">
                    <button class="btn btn-warning btn-lg px-4"
                            th:data-id="${product.id}"
                            onclick="addToCart(this)">
                        🛒 Thêm vào giỏ
                    </button>

                    <button class="btn btn-success btn-lg px-4"
                            th:data-id="${product.id}"
                            onclick="buyNow(this)">
                        Mua ngay
                    </button>
                </div>

                <div class="mt-4">
                    <a href="/shop" class="btn btn-outline-secondary">
                        ⬅ Quay lại mua hàng
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white bg-success border-0">
        <div class="toast-body">
            ✔ Đã thêm vào giỏ hàng
        </div>
    </div>
</div>

<script type="application/ld+json" th:inline="javascript">
    {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": "[[${product.name}]]",
        "image": "[[${product.image}]]",
        "description": "[[${product.description}]]",
        "offers": {
            "@type": "Offer",
            "price": "[[${product.price}]]",
            "priceCurrency": "VND"
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function addToCart(btn){
        let id = btn.getAttribute("data-id");

        fetch('/cart/add/' + id)
            .then(res => res.text())
            .then(() => {
                let toast = new bootstrap.Toast(document.getElementById('toast'));
                toast.show();
            });
    }

    function buyNow(btn){
        let id = btn.getAttribute("data-id");

        fetch('/cart/add/' + id)
            .then(res => res.text())
            .then(() => {
                window.location.href = "/checkout";
            });
    }
</script>

</body>
</html>
