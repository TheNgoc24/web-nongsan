<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Sửa bài viết</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="/admin">Quay lại Admin</a>
  </div>
</nav>

<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-warning">
      <h4 class="mb-0">Sửa bài viết</h4>
    </div>

    <div class="card-body">

      <form action="/admin/update-post" method="post">

        <input type="hidden" name="id" th:value="${post.id}">

        <label class="form-label">Tiêu đề bài viết</label>
        <input name="title"
               class="form-control mb-3"
               th:value="${post.title}"
               required>

        <label class="form-label">Link ảnh</label>
        <input name="image"
               class="form-control mb-3"
               th:value="${post.image}"
               required>

        <label class="form-label">Danh mục</label>
        <select name="category" class="form-control mb-3">
          <option value="Giới thiệu nông sản"
                  th:selected="${post.category == 'Giới thiệu nông sản'}">
            Giới thiệu nông sản
          </option>

          <option value="Tin tức nông sản"
                  th:selected="${post.category == 'Tin tức nông sản'}">
            Tin tức nông sản
          </option>

          <option value="Đặc sản Thái Nguyên"
                  th:selected="${post.category == 'Đặc sản Thái Nguyên'}">
            Đặc sản Thái Nguyên
          </option>

          <option value="Kiến thức tiêu dùng"
                  th:selected="${post.category == 'Kiến thức tiêu dùng'}">
            Kiến thức tiêu dùng
          </option>
        </select>

        <label class="form-label">Nội dung</label>
        <textarea name="content"
                  class="form-control mb-3"
                  rows="10"
                  required
                  th:text="${post.content}"></textarea>

        <button class="btn btn-success">
          Cập nhật bài viết
        </button>

        <a href="/admin" class="btn btn-secondary">
          Hủy
        </a>

      </form>

    </div>

  </div>

</div>

</body>
</html>
